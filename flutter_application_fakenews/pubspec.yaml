name: fake_news_scanner
description: AI-powered news credibility scanner with OCR and bilingual support.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Camera & Image Picking ──────────────────
  camera: ^0.10.5+9               # Real-time camera access
  image_picker: ^1.1.2            # Gallery / file picker

  # ── OCR ─────────────────────────────────────
  google_mlkit_text_recognition: ^0.13.0   # On-device OCR (Latin + Urdu scripts)

  # ── Networking ──────────────────────────────
  http: ^1.2.1                    # REST API calls to fact-checking backend
  dio: ^5.4.3+1                   # Advanced HTTP client (interceptors, retries)

  # ── Local Storage ───────────────────────────
  hive: ^2.2.3                    # Lightweight NoSQL for scan history
  hive_flutter: ^1.1.0            # Hive Flutter adapter
  shared_preferences: ^2.2.3      # Simple key-value persistence

  # ── State Management ────────────────────────
  provider: ^6.1.2                # Lightweight state management

  # ── UI & Animations ─────────────────────────
  flutter_animate: ^4.5.0         # Declarative animation helpers
  shimmer: ^3.0.0                 # Loading skeleton shimmer effect
  lottie: ^3.1.2                  # Lottie JSON animations
  cached_network_image: ^3.3.1    # Cached remote images for source logos

  # ── Sharing & Export ────────────────────────
  share_plus: ^9.0.0              # Share result cards
  screenshot: ^3.0.0              # Capture widget as image for sharing

  # ── Utilities ───────────────────────────────
  intl: ^0.19.0                   # Date/time formatting (scan timestamps)
  url_launcher: ^6.3.0            # Open source URLs in browser
  flutter_svg: ^2.0.10+1          # SVG icon rendering
  package_info_plus: ^8.0.2       # App version info
  connectivity_plus: ^6.0.3       # Network connectivity checks

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0           # Official Flutter lint rules
  hive_generator: ^2.0.1          # Hive type adapter code generation
  build_runner: ^2.4.9            # Code generation runner
  mockito: ^5.4.4                 # Mocking for unit tests
  mocktail: ^1.0.4                # Null-safe mock alternative

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/          # Lottie JSON files
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-SemiBold.ttf
          weight: 600
